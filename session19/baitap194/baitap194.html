<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="baitap194.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="todo-box">
        <h1>Todo App</h1>

        <div class="input-group">
          <input type="text" id="todo-input" placeholder="Add your new todo" />

          <button id="add-btn">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>

        <ul id="todo-list">
          <!-- <li>
            <span>Quét nhà</span>

            <button class="delete-btn">
              <i class="fa-solid fa-trash"></i>
            </button>
          </li>

          <li>
            <span>Rửa bát</span>

            <button class="delete-btn">
              <i class="fa-solid fa-trash"></i>
            </button>
          </li> -->
        </ul>

        <div class="footer">
          <p>
            You have
            <span id="task-count"></span>
            pending tasks
          </p>

          <button id="clear-btn">Clear All</button>
        </div>
      </div>
    </div>
    <script src="./baitap194.js"></script>
  </body>
</html>
