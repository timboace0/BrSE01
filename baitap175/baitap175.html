<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./baitap175.css" />
  </head>
  <body>
    <header>
      <h1>ELEGANT LOGIN FORM</h1>
    </header>

    <main class="main">
      <div class="" id="main-login-form">
        <div id="login-form-header">LOG IN</div>
        <form action="" id="form">
          <div name="email">
            <input type="text" placeholder="Email" id="email" />
          </div>
          <div name="password">
            <input type="password" placeholder="Password" id="password" />
          </div>
          <button id="submit-btn">Submit</button>
        </form>
        <div id="or-text"">OR</div>
        <div id="login-link">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Facebook_f_logo_%282019%29.svg/250px-Facebook_f_logo_%282019%29.svg.png" alt="">
            <img src="https://png.pngtree.com/png-clipart/20190516/original/pngtree-twitter-icon-logo-png-image_3560523.png" alt="">
            <img src="https://demenart.com/wp-content/plugins/nd-learning/addons/share/img/googleplus.svg" alt="">
        </div>
        <div class="sign-up">
        <p>No account yet?</p>
        <p>Signup</p>
        <p>Forgot your password?</p>
      </div>
      </div>
      
    </main>

    <footer class="footer">
      <p>
        &copy; Elegant Login Form, All Rights Reserved | Design by W3layouts
      </p>
    </footer>

    <script src="./baitap175.js"></script>
  </body>
</html>
