<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <form action="http://myserver.com" method="POST">
            <h3>SỞ THÍCH CỦA BẠN</h3>
                <div>
                    <label for="fullname">Họ và tên</label>
                    <input type="text" name="fullname" id="fullname" placeholder="Vd: Nguyễn Văn A">
                </div>
                <div>
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="nguyenvana@gmail.com">
                </div>
                <div>
            
                    <label for="hobby">Sở thích</label>
                        <input type="checkbox" name="hobby" id="sport" value="sport">
                        <label for="sport">Thể thao</label>
                        <input type="checkbox" name="hobby" id="music" value="music">
                        <label for="music">Âm nhạc</label>
                        <input type="checkbox" name="hobby" id="reading" value="reading">
                        <label for="reading">Đọc sách</label>
                        <br/>
                   
                        <input type="checkbox" name="hobby" id="webscroll" value="webscroll">
                        <label for="webscroll">Lướt web</label>
                        <input type="checkbox" name="hobby" id="game" value="game">
                        <label for="game">Chơi game</label>
                        <input type="checkbox" name="hobby" id="cinema" value="cinema">
                        <label for="cinema">Điện ảnh</label>
                        <br/>
                        <input type="checkbox" name="hobby" id="travel" value="travel">
                        <label for="travel">Du lịch</label>
                </div>
                <input type="submit" value="Gửi thông tin"> 
                <input type="reset" value="Nhập lại"> 
        </form>
    </main>
</body>
</html>
