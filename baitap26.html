<body>
    <header>
        <h1>Trang web bán hàng</h1>
        <nav>
            <ul>
                <li><a href="">Trang chủ</a></li>
                <li><a href="">Sản phẩm</a></li>
                <li><a href="">Giới thiệu</a></li>
                <li><a href="">Liên hệ</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Thông tin sản phẩm</h2>
        <table border="2">
            <thead>
                <tr>
                    <th>Tên sản phẩm</th>
                    <th>Mô tả</th>
                    <th>Giá</th>
                    <th>Số lượng</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Sản phẩm 1</td>
                    <td>Mô tả sản phẩm 1</td>
                    <td>100.000đ</td>
                    <td>10</td>
                </tr>
                <tr>
                    <td>Sản phẩm 2</td>
                    <td>Mô tả sản phẩm 2</td>
                    <td>200.000đ</td>
                    <td>5</td>
                </tr>
                <tr>
                    <td>Sản phẩm 3</td>
                    <td>Mô tả sản phẩm 3</td>
                    <td>300.000đ</td>
                    <td>3</td>
                </tr>
            </tbody>
        </table>
        <form action="http://myserver.com" method="POST" style="margin-bottom: 10px;">
            <h2>Thông tin người dùng</h2>
            <label for="username">Họ và tên:</label>
            <input type="text" name="username" id="username"/> <br/>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email"/> <br/>
            <label for="user_tel">Số điện thoại:</label>
            <input type="tel" name="user_tel" id="user_tel"/> <br/>
            <label for="address">Địa chỉ:</label>
            <input type="text" name="address" id="address"/> <br/>
            <button type="submit">Đặt hàng</button>
        </form>
    </main>
