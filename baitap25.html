    <form action="http://myserver.com" method="POST">
        <h2>Booking Form</h2>
        <label for="name">Name:</label>
        <input type="text" name="name" id="name" style="margin-bottom: 10px;"/> <br/>
        <label for="email">Email:</label>
        <input type="email" name="email" id="email" style="margin-bottom: 10px;"/> <br/>
        <label for="phone">Phone:</label>
        <input type="tel" name="phone" id="phone" style="margin-bottom: 10px;"/> <br/>
        <label for="date">Date:</label>
        <input type="date" name="date" id="date" style="margin-bottom: 10px;"/> <br/>
        <label for="time">Time:</label>
        <input type="time" name="time" id="time" style="margin-bottom: 10px;"/> <br/>
        <label for="number_of_guests">Number of Guests:</label>
        <input type="number" name="number_of_guests" id="number_of_guests" min="0" max="50" style="margin-bottom: 10px;"/> <br/>
        <button type="submit">Submit</button>
    </form>

    <form action="http://myserver.com" method="POST">
        <h2>Car Purchase Form</h2>
        <label for="name">Name:</label>
        <input type="text" name="name" id="name" style="margin-bottom: 10px;"/> <br/>
        <label for="email">Email:</label>
        <input type="email" name="email" id="email" style="margin-bottom: 10px;"/> <br/>
        <label for="phone">Phone:</label>
        <input type="tel" name="phone" id="phone" style="margin-bottom: 10px;"/> <br/>
        <label for="car_choose">Choose a Car:</label>
        <select name="car_choose" id="car_choose" style="margin-bottom: 10px;">
            <option value="1">Model 1</option>
            <option value="2">Model 2</option>
            <option value="3">Model 3</option>
        </select> <br/>
        <label for="color_choose">Choose a Color:</label>
        <select name="color_choose" id="color_choose" style="margin-bottom: 10px;">
            <option value="red">Red</option>
            <option value="blue">Blue</option>
            <option value="white">White</option>
        </select> <br/>
        <label for="quantity">Quantity:</label>
        <input type="number" name="quantity" id="quantity" min="0" max="50" style="margin-bottom: 10px;"/> <br/>
        <label for="deli_date">Delivery Date:</label>
        <input type="date" name="deli_date" id="deli_date" style="margin-bottom: 10px;"/> <br/>
        <button type="submit">Submit</button>
    </form>
</body>
