<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="http://myserver.com" method="POST">
    <h1>Tìm Kiếm Sản Phẩm</h1>
    <div>
        <label for="search">Từ khóa tìm kiếm:</label><br>
        <input type="text" id="search" name="search">
    </div>
    <div>
        <label for="product_type">Loại sản phẩm:</label><br>
        <select id="product_type" name="product_type">
            <option value="electronic">Điện tử</option>
            <option value="household">Gia dụng</option>
            <option value="refrigeration">Điện lạnh</option>
        </select>
    </div>
    <input type="submit" value="Tìm Kiếm">
    </form>
</body>
</html>
